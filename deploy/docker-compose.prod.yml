version: '3.8'

services:
  smart-vehicle-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.prod
    container_name: smart-vehicle-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - AMAP_JS_KEY=${45109d104b3c8d03a2c84175a7749241}
      - AMAP_SECURITY_CODE=${c552677838e5f5e71de92ce532c936bc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - smart-vehicle-network

  redis:
    image: redis:7-alpine
    container_name: smart-vehicle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - smart-vehicle-network

  nginx:
    image: nginx:alpine
    container_name: smart-vehicle-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./public:/app/public:ro
    depends_on:
      - smart-vehicle-server
    networks:
      - smart-vehicle-network

volumes:
  redis_data:

networks:
  smart-vehicle-network:
    driver: bridge
