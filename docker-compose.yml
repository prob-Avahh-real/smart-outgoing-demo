version: '3.8'

services:
  smart-outgoing-demo:
    build: .
    ports:
      - "8080:8080"
    environment:
      - AMAP_JS_KEY=${AMAP_JS_KEY:-45109d104b3c8d03a2c84175a7749241}
      - AMAP_SECURITY_CODE=${AMAP_SECURITY_CODE:-c552677838e5f5e71de92ce532c936bc}
      - AMAP_WEB_KEY=${AMAP_WEB_KEY:-your_amap_web_key}
      - DEMO_ADMIN_TOKEN=${DEMO_ADMIN_TOKEN:-demo_admin_token}
      - PORT=8080
      - WRITE_RATE_LIMIT_WINDOW_MS=60000
      - WRITE_RATE_LIMIT_MAX=30
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add Redis for production caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data:
